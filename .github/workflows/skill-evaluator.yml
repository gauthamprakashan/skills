name: Skill Evaluator (Tier 1)

on:
  pull_request:
    branches: [main]
    paths:
      - "skills/**"
      - "packages/skill-evaluator/**"

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Detect changed skills
        id: detect
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          # Find changed files under skills/
          CHANGED_SKILLS=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- 'skills/' \
            | awk -F/ 'NF>=2 {print $1"/"$2}' \
            | sort -u)

          # Check if only the evaluator itself changed (no skills)
          EVALUATOR_CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- 'packages/skill-evaluator/' | head -1)

          if [ -z "$CHANGED_SKILLS" ] && [ -n "$EVALUATOR_CHANGED" ]; then
            echo "No skill changes detected — running against all skills as regression test"
            CHANGED_SKILLS=$(find skills -mindepth 1 -maxdepth 1 -type d | sort)
          fi

          if [ -z "$CHANGED_SKILLS" ]; then
            echo "No skills to evaluate"
            echo "skills=" >> "$GITHUB_OUTPUT"
          else
            echo "Skills to evaluate:"
            echo "$CHANGED_SKILLS"
            # Store as newline-separated list
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "skills<<$EOF" >> "$GITHUB_OUTPUT"
            echo "$CHANGED_SKILLS" >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Tier 1 evaluations
        id: evaluate
        if: steps.detect.outputs.skills != ''
        working-directory: packages/skill-evaluator
        env:
          SKILLS_LIST: ${{ steps.detect.outputs.skills }}
        run: |
          FAILED=0
          TOTAL=0
          REPORT=""

          while IFS= read -r skill_dir; do
            [ -z "$skill_dir" ] && continue
            TOTAL=$((TOTAL + 1))
            SKILL_PATH="../../${skill_dir}"

            echo "::group::Evaluating ${skill_dir}"
            OUTPUT=$(uv run evaluate.py "$SKILL_PATH" --tier 1 2>&1) && STATUS=0 || STATUS=$?
            echo "$OUTPUT"

            REPORT="${REPORT}
          ### \`${skill_dir}\`

          \`\`\`
          ${OUTPUT}
          \`\`\`
          "

            if [ "$STATUS" -ne 0 ]; then
              echo "::error::${skill_dir} failed Tier 1 checks"
              FAILED=$((FAILED + 1))
            fi
            echo "::endgroup::"
          done <<< "$SKILLS_LIST"

          echo ""
          echo "=== Results: ${TOTAL} skill(s) evaluated, ${FAILED} failed ==="

          # Save results to files for artifact upload
          mkdir -p /tmp/eval-results
          echo "$REPORT" > /tmp/eval-results/report.md
          echo "$FAILED" > /tmp/eval-results/failed_count
          echo "$TOTAL" > /tmp/eval-results/total_count
          echo "${{ github.event.pull_request.number }}" > /tmp/eval-results/pr_number

          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi

      - name: Upload evaluation results
        if: always() && steps.evaluate.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: /tmp/eval-results/
